apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-catalogue-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-catalogue
  template:
    metadata:
      labels:
        app: postgres-catalogue
    spec:
      containers:
        - name: postgres-catalogue
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: service1db
            - name: POSTGRES_USER
              value: service1user
            - name: POSTGRES_PASSWORD
              value: service1pass
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-catalogue-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-catalogue-service
spec:
  type: ClusterIP
  selector:
    app: postgres-catalogue
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432